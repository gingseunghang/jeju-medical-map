<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주 어르신 안심 의료지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --primary: #1a5276;
    --accent: #e74c3c;
    --green: #27ae60;
    --yellow: #f39c12;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #dde3ea;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* 헤더 */
  header {
    background: var(--primary);
    color: white;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 12px rgba(26,82,118,0.3);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .header-icon {
    font-size: 36px;
  }

  .header-text h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 2px;
  }

  .header-badge {
    margin-left: auto;
    background: var(--accent);
    color: white;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* 메인 레이아웃 */
  .container {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 72px);
  }

  /* 사이드바 */
  .sidebar {
    background: var(--card);
    border-right: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: #f8fafc;
  }

  .sidebar-top h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 12px;
  }

  /* 지역 선택 */
  .region-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .region-btn {
    background: white;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 8px 4px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.2;
  }

  .region-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: #eaf0f8;
  }

  .region-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  .region-btn.island {
    border-color: #8e44ad;
    color: #8e44ad;
  }

  .region-btn.island.active {
    background: #8e44ad;
    color: white;
    border-color: #8e44ad;
  }

  /* 필터 */
  .filter-row {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active {
    border-color: currentColor;
  }

  .filter-btn[data-type="health_center"] { color: #e74c3c; }
  .filter-btn[data-type="hospital"] { color: #2980b9; }
  .filter-btn[data-type="dental"] { color: #27ae60; }
  .filter-btn[data-type="oriental"] { color: #8e44ad; }
  .filter-btn[data-type="clinic"] { color: #e67e22; }
  .filter-btn[data-type="pharmacy"] { color: #16a085; }

  .filter-btn[data-type="health_center"].active { background: #fdecea; }
  .filter-btn[data-type="hospital"].active { background: #eaf3fb; }
  .filter-btn[data-type="dental"].active { background: #eafaf1; }
  .filter-btn[data-type="oriental"].active { background: #f5eef8; }
  .filter-btn[data-type="clinic"].active { background: #fef9e7; }

  /* 병원 목록 */
  .hospital-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .hospital-count {
    padding: 8px 8px 4px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }

  .hospital-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .hospital-card:hover {
    border-color: var(--primary);
    box-shadow: 0 2px 8px rgba(26,82,118,0.12);
    transform: translateY(-1px);
  }

  .hospital-card.selected {
    border-color: var(--primary);
    background: #eaf0f8;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
  }

  .type-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .hospital-name {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    flex: 1;
  }

  .hospital-type-label {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
  }

  .card-info {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .card-info .phone {
    color: var(--primary);
    font-weight: 700;
    font-size: 13px;
  }

  .today-hours {
    display: inline-block;
    margin-top: 4px;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .open { background: #d4edda; color: #155724; }
  .closed { background: #f8d7da; color: #721c24; }
  .unknown { background: #e2e3e5; color: #383d41; }

  /* 지도 */
  #map {
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* 팝업 스타일 */
  .popup-content {
    font-family: 'Noto Sans KR', sans-serif;
    min-width: 220px;
  }

  .popup-name {
    font-size: 16px;
    font-weight: 900;
    color: var(--primary);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .popup-type {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .popup-phone {
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .popup-address {
    font-size: 12px;
    color: #555;
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .popup-hours {
    border-top: 1px solid var(--border);
    padding-top: 8px;
    font-size: 12px;
  }

  .popup-hours table {
    width: 100%;
    border-collapse: collapse;
  }

  .popup-hours td {
    padding: 2px 4px;
    color: #444;
  }

  .popup-hours td:first-child {
    font-weight: 700;
    color: var(--primary);
    width: 30px;
  }

  .popup-call-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
  }

  /* 범례 */
  .legend {
    position: absolute;
    bottom: 30px;
    right: 10px;
    background: white;
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    z-index: 500;
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .legend h4 {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-weight: 600;
    color: var(--text);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* 섬 경고 배너 */
  .island-warning {
    display: none;
    background: #fff3cd;
    border-left: 4px solid #f39c12;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #856404;
  }

  .island-warning.show { display: block; }

  /* 스크롤바 */
  .hospital-list::-webkit-scrollbar { width: 4px; }
  .hospital-list::-webkit-scrollbar-track { background: #f1f1f1; }
  .hospital-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

  /* 모바일 */
  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: auto;
    }

    .sidebar {
      max-height: 50vh;
    }

    #map {
      height: 50vh;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">🏥</div>
  <div class="header-text">
    <h1>제주 어르신 안심 의료지도</h1>
    <p>읍면·도서지역 가까운 의료기관 찾기</p>
  </div>
  <div class="header-badge">126개 기관</div>
</header>

<div class="container">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-top">
      <h2>📍 지역 선택</h2>
      <div class="region-grid">
        <button class="region-btn active" data-region="all" onclick="selectRegion(this, 'all')">전체</button>
        <button class="region-btn" data-region="한림읍" onclick="selectRegion(this, '한림읍')">한림읍</button>
        <button class="region-btn" data-region="애월읍" onclick="selectRegion(this, '애월읍')">애월읍</button>
        <button class="region-btn" data-region="조천읍" onclick="selectRegion(this, '조천읍')">조천읍</button>
        <button class="region-btn" data-region="대정읍" onclick="selectRegion(this, '대정읍')">대정읍</button>
        <button class="region-btn" data-region="성산읍" onclick="selectRegion(this, '성산읍')">성산읍</button>
        <button class="region-btn" data-region="남원읍" onclick="selectRegion(this, '남원읍')">남원읍</button>
        <button class="region-btn" data-region="표선면" onclick="selectRegion(this, '표선면')">표선면</button>
        <button class="region-btn" data-region="안덕면" onclick="selectRegion(this, '안덕면')">안덕면</button>
        <button class="region-btn" data-region="한경면" onclick="selectRegion(this, '한경면')">한경면</button>
        <button class="region-btn island" data-region="우도면" onclick="selectRegion(this, '우도면')">🏝 우도</button>
        <button class="region-btn island" data-region="추자도" onclick="selectRegion(this, '추자도')">🏝 추자도</button>
      </div>
    </div>

    <div class="island-warning" id="islandWarning">
      ⚠️ 도서지역입니다. 응급 시 119에 먼저 연락하세요. (닥터헬기 배치 지역)
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-type="health_center" onclick="toggleFilter(this)">🔴 보건지소</button>
      <button class="filter-btn active" data-type="hospital" onclick="toggleFilter(this)">🔵 의원</button>
      <button class="filter-btn active" data-type="dental" onclick="toggleFilter(this)">🟢 치과</button>
      <button class="filter-btn active" data-type="oriental" onclick="toggleFilter(this)">🟣 한의원</button>
      <button class="filter-btn active" data-type="clinic" onclick="toggleFilter(this)">🟠 진료소</button>
    </div>

    <div class="hospital-count" id="hospitalCount">전체 126개 기관</div>
    <div class="hospital-list" id="hospitalList"></div>
  </div>

  <!-- 지도 -->
  <div style="position:relative;">
    <div id="map"></div>
    <div class="legend">
      <h4>기관 종류</h4>
      <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div>보건소·보건지소</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2980b9"></div>의원·병원</div>
      <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div>치과</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8e44ad"></div>한의원</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div>보건진료소</div>
    </div>
  </div>
</div>

const DAYS = ['일','월','화','수','목','금','토'];
const DAY_KEYS = ['일','월','화','수','목','금','토'];

// 현재 요일
function getTodayHours(h) {
  const d = new Date();
  const dayKey = DAYS[d.getDay()];
  return h[dayKey] || '';
}

function isOpenNow(h) {
  const hours = getTodayHours(h);
  if (!hours) return null;
  const [start, end] = hours.split('~');
  if (!start || !end) return null;
  const now = new Date();
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  const nowMin = now.getHours()*60 + now.getMinutes();
  const startMin = sh*60 + sm;
  const endMin = eh*60 + em;
  return nowMin >= startMin && nowMin <= endMin;
}

  return L.divIcon({
    className: '',
    html: `<div style="
      width:30px;height:30px;
      background:${cfg.color};
      border:3px solid white;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    "></div>`,
    iconSize: [30,30],
    iconAnchor: [15,30],
    popupAnchor: [0,-30]
  });
}

// ─── 팝업 내용 ───────────────────────────────────────────
function makePopup(h) {
  const cfg = TYPE_CONFIG[h.type] || TYPE_CONFIG.hospital;
  const openStatus = isOpenNow(h);
  const todayHours = getTodayHours(h);

  const hoursRows = DAY_KEYS.map(d => {
    const v = h[d];
    if (!v) return '';
    return `<tr><td>${d}</td><td>${v}</td></tr>`;
  }).join('');

  return `
    <div class="popup-content">
      <div class="popup-name">${h['병원명']}</div>
      <div class="popup-type" style="color:${cfg.color}">${cfg.emoji} ${h['업무구분'].replace('응급의료기관 이외>','')}</div>
      <div class="popup-phone">📞 ${h['대표전화']}</div>
      <div class="popup-address">📍 ${h['주소']}</div>
      ${todayHours ? `<div style="margin-bottom:8px">
        <span class="today-hours ${openStatus === true ? 'open' : openStatus === false ? 'closed' : 'unknown'}">
          오늘 ${todayHours} ${openStatus === true ? '✅ 진료중' : openStatus === false ? '❌ 마감' : ''}
        </span>
      </div>` : ''}
      <div class="popup-hours">
        <table>${hoursRows}</table>
      </div>
      <a class="popup-call-btn" href="tel:${h['대표전화']}">📞 전화 연결</a>
    </div>
  `;
}

// ─── 렌더링 ──────────────────────────────────────────────
function render() {
  // 마커 제거
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  // 필터링
  const filtered = HOSPITALS.filter(h => {
    if (currentRegion !== 'all' && h['지역'] !== currentRegion) return false;
    if (!activeFilters.has(h.type)) return false;
    return true;
  });

  // 카운트
  document.getElementById('hospitalCount').textContent = 
    `${currentRegion === 'all' ? '전체' : currentRegion} ${filtered.length}개 기관`;

  // 리스트 렌더
  const list = document.getElementById('hospitalList');
  list.innerHTML = filtered.map((h, i) => {
    const cfg = TYPE_CONFIG[h.type] || TYPE_CONFIG.hospital;
    const openStatus = isOpenNow(h);
    const todayHours = getTodayHours(h);
    let statusClass = 'unknown', statusText = '시간 미등록';
    if (todayHours) {
      statusClass = openStatus ? 'open' : 'closed';
      statusText = openStatus ? `진료중 (${todayHours})` : `마감 (${todayHours})`;
    }
    return `
      <div class="hospital-card" id="card-${i}" onclick="focusHospital(${i})">
        <div class="card-header">
          <div class="type-dot" style="background:${cfg.color}"></div>
          <div class="hospital-name">${h['병원명']}</div>
          <span class="hospital-type-label" style="background:${cfg.color}22;color:${cfg.color}">${cfg.label}</span>
        </div>
        <div class="card-info">
          <div class="phone">📞 ${h['대표전화']}</div>
          <div>📍 ${h['주소'].replace('제주특별자치도 ','')}</div>
          <span class="today-hours ${statusClass}">${statusText}</span>
        </div>
      </div>
    `;
  }).join('');

  // 마커 추가
  filtered.forEach((h, i) => {
    const marker = L.marker(h.coords, { icon: makeIcon(h.type) })
      .addTo(map)
      .bindPopup(makePopup(h), { maxWidth: 280 });
    marker._hospitalIndex = i;
    markers.push(marker);
  });

  // 지도 이동
  if (currentRegion !== 'all' && filtered.length > 0) {
    map.setView(filtered[0].coords, 14);
  } else {
    map.setView([33.38, 126.55], 10);
  }

  // 섬 경고
  const warning = document.getElementById('islandWarning');
  if (currentRegion === '우도면' || currentRegion === '추자도') {
    warning.classList.add('show');
  } else {
    warning.classList.remove('show');
  }
}

function focusHospital(i) {
  const filtered = HOSPITALS.filter(h => {
    if (currentRegion !== 'all' && h['지역'] !== currentRegion) return false;
    if (!activeFilters.has(h.type)) return false;
    return true;
  });
  const h = filtered[i];
  if (!h) return;

  // 카드 선택
  document.querySelectorAll('.hospital-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById(`card-${i}`);
  if (card) {
    card.classList.add('selected');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // 마커 팝업
  if (markers[i]) {
    map.setView(h.coords, 16);
    markers[i].openPopup();
  }
}

function selectRegion(btn, region) {
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRegion = region;
  render();
}

function toggleFilter(btn) {
  const type = btn.dataset.type;
  if (activeFilters.has(type)) {
    activeFilters.delete(type);
    btn.classList.remove('active');
  } else {
    activeFilters.add(type);
    btn.classList.add('active');
  }
  render();
}

// 초기 렌더
render();
</script>
</body>
</html>
